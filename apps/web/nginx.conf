# Static hosting for the Interscale Travel CRM SPA.
#
# Paired with the nginx-unprivileged base image, which runs as a non-root user
# and listens on 8080. In real production, a CDN (CloudFront) or ALB typically
# fronts this and can add security headers centrally.

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Container / load-balancer health probe. Static, never touches the API.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Hashed, content-addressed build assets: safe to cache forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # The HTML entry point must never be cached, so a new deploy is picked up
    # immediately even while assets stay long-lived.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA history fallback: unknown paths render the app shell.
    location / {
        try_files $uri $uri/ /index.html;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}
